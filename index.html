<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-Mai</title>
    <!-- Tailwind CDN is kept for simplicity to match existing styling without complex setup -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Prompt', 'sans-serif'],
            },
            colors: {
              wood: {
                50: '#fbf7f1',
                100: '#f5eadb',
                200: '#ebd3b4',
                300: '#deb586',
                400: '#d09257',
                500: '#c67636',
                600: '#ba5e2c',
                700: '#9b4926',
                800: '#7f3c25',
                900: '#663222',
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #fbf7f1;
      }
      @keyframes highlight-pulse {
        0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); border-width: 2px; }
        50% { box-shadow: 0 0 0 8px rgba(220, 38, 38, 0); border-width: 4px; }
        100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); border-width: 2px; }
      }
      .weak-point-active {
        animation: highlight-pulse 1.5s infinite;
        z-index: 30;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Entry point for Vite -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
